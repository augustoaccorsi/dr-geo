<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecionando…</title>
    <script>
      // GitHub Pages SPA redirect — preserves path under /dr-geo/ base
      var segmentCount = 1; // number of path segments in the repo base (dr-geo = 1)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.split('/').slice(1 + segmentCount).join('/') +
          (l.search ? '&' + l.search.slice(1) : '')) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
